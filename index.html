<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FASITLAC</title>
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- Meta Datos para Redes Sociales -->
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://fasitlac.com/">
    <meta property="og:title" content="FASITLAC">
    <meta property="og:description"
        content="Fábrica de Software Integral. Calidad, innovación y compromiso en cada detalle.">
    <meta property="og:image" content="https://fasitlac.com/logo.jpeg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://fasitlac.com/">
    <meta property="twitter:title" content="FASITLAC">
    <meta property="twitter:description"
        content="Fábrica de Software Integral. Calidad, innovación y compromiso en cada detalle.">
    <meta property="twitter:image" content="https://fasitlac.com/logo.jpeg">
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <main>
        <div id="logo-placeholder">
            <!-- Aquí pegaré el SVG qu e me envíes -->
        </div>
        <div class="content-bottom">
            <h1>PRÓXIMAMENTE</h1>
            <div id="countdown" class="countdown">
                <div class="countdown-item">
                    <span id="days" class="countdown-value">00</span>
                    <span class="countdown-label">Días</span>
                </div>
                <div class="countdown-item">
                    <span id="hours" class="countdown-value">00</span>
                    <span class="countdown-label">Horas</span>
                </div>
                <div class="countdown-item">
                    <span id="minutes" class="countdown-value">00</span>
                    <span class="countdown-label">Min</span>
                </div>
                <div class="countdown-item">
                    <span id="seconds" class="countdown-value">00</span>
                    <span class="countdown-label">Seg</span>
                </div>
            </div>
            <div class="contact">
                <a href="https://instagram.com/fasitlac" target="_blank" aria-label="Instagram">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-instagram">
                        <rect width="20" height="20" x="2" y="2" rx="5" ry="5" />
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                        <line x1="17.5" x2="17.51" y1="6.5" y2="6.5" />
                    </svg>
                    <span>@fasitlac</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        const targetDate = new Date('May 20, 2026 00:00:00').getTime();

        const updateCountdown = () => {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference < 0) {
                document.getElementById('countdown').innerHTML = "¡YA DISPONIBLE!";
                return;
            }

            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById('days').innerText = days.toString().padStart(2, '0');
            document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('seconds').innerText = seconds.toString().padStart(2, '0');
        };

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>

</html>
